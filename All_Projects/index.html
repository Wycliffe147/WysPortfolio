<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Projects - Wy's Portfolio (Design 3)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dark-mode">
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">Wy's Portfolio</div>
                <nav>
                    <ul>
                        <li><a href="../index.html">Home</a></li>
                        <li>
                            <button class="theme-toggle" id="themeToggle" aria-label="Toggle Dark Mode" style="background:none; border:none; color:white; cursor:pointer; margin-left:1.5rem; display:flex; align-items:center;">
                                <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="5"></circle>
                                    <line x1="12" y1="1" x2="12" y2="3"></line>
                                    <line x1="12" y1="21" x2="12" y2="23"></line>
                                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                                    <line x1="1" y1="12" x2="3" y2="12"></line>
                                    <line x1="21" y1="12" x2="23" y2="12"></line>
                                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                                </svg>
                                <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                                </svg>
                            </button>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>My Creative <span>Showcase</span></h1>
            <p>Explore a collection of my DIY projects, software tools, and educational content.</p>
            <div class="search-container">
                <input type="text" class="search-input" id="projectSearch" placeholder="Search by name, category, or tech...">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
            </div>
        </div>
    </section>

    <section class="filters">
        <div class="container">
            <div class="filter-group" id="filterGroup">
                <button class="filter-btn active" data-category="all">All</button>
                <button class="filter-btn" data-category="Web App">Web Apps</button>
                <button class="filter-btn" data-category="Tool">Tools</button>
                <button class="filter-btn" data-category="Mobile">Mobile</button>
                <button class="filter-btn" data-category="AI Tool">AI Tools</button>
            </div>
        </div>
    </section>

    <main class="grid-section">
        <div class="container">
            <div id="bentoGrid" class="bento-grid">
                <!-- Loaded via main.js -->
            </div>
            <div id="noResults" class="no-results" style="display: none;">
                <i class="fas fa-search-minus"></i>
                <p>No matches found in the gallery.</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Wy's Portfolio. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
