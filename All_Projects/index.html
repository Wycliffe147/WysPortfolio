<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Projects - Wy's Portfolio (Design 3)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">Wy's Portfolio</div>
                <nav>
                    <ul>
                        <li><a href="../index.html">Home</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>My Creative <span>Showcase</span></h1>
            <p>Explore a collection of my DIY projects, software tools, and educational content.</p>
            <div class="search-container">
                <input type="text" class="search-input" id="projectSearch" placeholder="Search by name, category, or tech...">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
            </div>
        </div>
    </section>

    <section class="filters">
        <div class="container">
            <div class="filter-group" id="filterGroup">
                <button class="filter-btn active" data-category="all">All</button>
                <button class="filter-btn" data-category="Web App">Web Apps</button>
                <button class="filter-btn" data-category="Tool">Tools</button>
                <button class="filter-btn" data-category="Mobile">Mobile</button>
                <button class="filter-btn" data-category="AI Tool">AI Tools</button>
            </div>
        </div>
    </section>

    <main class="grid-section">
        <div class="container">
            <div id="bentoGrid" class="bento-grid">
                <!-- Loaded via main.js -->
            </div>
            <div id="noResults" class="no-results" style="display: none;">
                <i class="fas fa-search-minus"></i>
                <p>No matches found in the gallery.</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Wy's Portfolio. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
